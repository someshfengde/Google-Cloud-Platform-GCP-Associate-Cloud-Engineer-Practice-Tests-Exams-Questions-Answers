<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GCP ACE Practice</title>
    <meta name="description" content="Static GitHub Pages MCQ practice app for GCP Associate Cloud Engineer questions." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">GCP Associate Cloud Engineer</p>
        <h1>Practice</h1>
      </div>
      <nav class="topbar-actions" aria-label="App actions">
        <a class="button secondary" href="README.md">README</a>
        <button id="resetProgress" class="button danger" type="button">Reset</button>
      </nav>
    </header>

    <main class="app-shell">
      <section class="stats" aria-label="Progress summary">
        <article><span id="totalQuestions">0</span><small>Total</small></article>
        <article><span id="answeredQuestions">0</span><small>Answered</small></article>
        <article><span id="correctQuestions">0</span><small>Correct</small></article>
        <article><span id="mistakeCount">0</span><small>Mistakes</small></article>
        <article><span id="scorePercent">0%</span><small>Score</small></article>
      </section>

      <section class="control-surface" aria-label="Practice controls">
        <div class="toolbar">
          <label>
            Search
            <input id="searchInput" type="search" placeholder="Question or answer text" autocomplete="off" />
          </label>
          <label>
            View
            <select id="filterSelect">
              <option value="all">All questions</option>
              <option value="unanswered">Unanswered</option>
              <option value="correct">Correct now</option>
              <option value="incorrect">Incorrect now</option>
              <option value="needs-review">Needs review</option>
              <option value="flagged">Flagged</option>
            </select>
          </label>
          <button id="shuffleButton" class="button" type="button">Shuffle</button>
          <button id="nextUnanswered" class="button" type="button">Next unanswered</button>
        </div>

        <section class="sync-panel" aria-label="Progress sync">
          <div class="sync-heading">
            <div>
              <h2>Cloud Progress</h2>
              <p id="syncPathPreview" class="sync-path">progress/default.json</p>
            </div>
            <span id="syncBadge" class="sync-badge">Unsaved</span>
          </div>
          <div class="sync-grid">
            <label>
              Profile
              <input id="syncProfile" type="text" autocomplete="username" />
            </label>
          </div>
          <div class="sync-actions">
            <button id="loadProgress" class="button secondary-dark" type="button">Load</button>
            <button id="saveProgress" class="button" type="button">Save</button>
          </div>
          <p id="syncStatus" class="sync-status" role="status">Cloud API saves progress to GitHub.</p>
        </section>
      </section>

      <section id="statusMessage" class="status" role="status">Loading questions from README.md...</section>
      <section id="questionList" class="question-list" aria-live="polite"></section>
    </main>

    <template id="questionTemplate">
      <article class="card">
        <div class="card-header">
          <div>
            <span class="question-number"></span>
            <span class="question-state"></span>
          </div>
          <button class="flag-button" type="button" aria-pressed="false">Flag</button>
        </div>
        <h2 class="question-text"></h2>
        <div class="question-media"></div>
        <div class="options"></div>
        <p class="feedback" aria-live="polite"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
